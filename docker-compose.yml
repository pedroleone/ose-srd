services:
  dev:
    image: node:20-bookworm
    container_name: ose-dev
    working_dir: /app
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npx docusaurus start --host 0.0.0.0"
    stdin_open: true
    tty: true

  prod:
    build: .
    container_name: ose-prod
    ports:
      - "8080:8080"
